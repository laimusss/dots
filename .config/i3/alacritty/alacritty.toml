# Colors (Ayu Mirage)

# Default Colors
[colors.primary]
background = "#1f2430"
foreground = "#cbccc6"
bright_foreground = "#f28779"

# Normal colors
[colors.normal]
black = "#212733"
red = "#f08778"
green = "#53bf97"
yellow = "#fdcc60"
blue = "#60b8d6"
magenta = "#ec7171"
cyan = "#98e6ca"
white = "#fafafa"

# Bright colors
[colors.bright]
black = "#686868"
red = "#f58c7d"
green = "#58c49c"
yellow = "#ffd165"
blue = "#65bddb"
magenta = "#f17676"
cyan = "#9debcf"
white = "#ffffff"

[font]
size = 11.0

# Основной шрифт
[font.normal]
family = "Fira Code"  # или просто "Fira Code"
style = "Regular"

# Полужирный
[font.bold]
family = "Fira Code"
style = "Bold"

# Курсив
[font.italic]
family = "Fira Code"
style = "Italic"

# Полужирный курсив (опционально)
[font.bold_italic]
family = "Fira code Font"
style = "Bold Italic"

# Смещение глифов (тонкая настройка)
[font.offset]
x = 0
y = 0
